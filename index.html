<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>leo_grayratの笔记库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">正在加载笔记...</div>
  <script>
    window.$docsify = {
      name: 'Digital Garden',
      repo: 'https://github.com/leo-grayrat/leo-grayrat-Digital-Garden',
      loadSidebar: true, //设为true才会读取_sidebar.md
      subMaxLevel: 2,    //自动把 md 里的标题放到侧边栏
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' //防止子目录找不到侧边栏
      },
      auto2top: true,    //切换页面后自动回到顶部
      search: {
        placeholder: '搜索笔记',
        noData: '找不到结果',
        depth: 3
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
