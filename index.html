<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>leo_grayratの笔记库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 1. KaTeX 样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css">
</head>
<body>
  <div id="app">正在加载笔记...</div>
  <script>
    window.$docsify = {//Gemini真的可信吗？不得而知
      name: 'Digital Garden',
      repo: 'https://github.com/leo-grayrat/leo-grayrat-Digital-Garden',
      loadSidebar: true,
      subMaxLevel: 2,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      auto2top: true,
      // 2. LaTeX 插件配置
      latex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']], // 支持 $公式$
        displayMath: [['$$', '$$'], ['\\[', '\\]']], // 支持 $$公式$$
      },
      search: {
        placeholder: '搜索笔记',
        noData: '找不到结果',
        depth: 3
      }
    }
  </script>
  
  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- 3. LaTeX 渲染核心组件 (顺序不能错) -->
  <!-- KaTeX 核心库 -->
  <script src="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <!-- 这里的 docsify-latex 插件比之前那个更稳 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0/dist/docsify-latex.js"></script>
  
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
